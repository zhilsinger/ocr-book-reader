name: ocr_book_reader
description: OCR Book Reader — Process scanned PDFs with Rust backend and Flutter UI
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0
  flutter: ^3.31.0

dependencies:
  flutter:
    sdk: flutter
  rinf: ^7.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
