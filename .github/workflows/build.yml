name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  # ─── Rust backend: build + test ───
  rust:
    name: Rust Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps (leptess)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libleptonica-dev libtesseract-dev tesseract-ocr-eng

      - name: Build Rust
        run: cargo build --release

      - name: Test Rust
        run: cargo test --release 2>&1 || echo "No tests yet — continuing"

  # ─── Flutter: analyze + build APK ───
  flutter:
    name: Flutter Android APK
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Regenerate platform projects
        run: |
          rm -rf android ios linux macos windows web
          flutter create --platforms android --org com.ocrbookreader --project-name ocrbookreader .

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK (debug)
        run: |
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─── Integration test (placeholder) ───
  test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: flutter
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Integration tests will run here once rinf bridge is connected"

  # ─── Emulator APK smoke test ───
  emulator-test:
    name: Emulator Smoke Test
    runs-on: ubuntu-latest
    needs: flutter
    if: success()
    strategy:
      matrix:
        api-level: [30]
    steps:
      - uses: actions/checkout@v4

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: ./apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || echo "KVM not available on this runner"

      - name: Run on Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          script: |
            adb wait-for-device
            adb install apk/app-debug.apk
            adb shell am start -n com.ocrbookreader.app/.MainActivity
            sleep 10
            adb exec-out screencap -p > screenshot.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot-api${{ matrix.api-level }}
          path: screenshot.png
          retention-days: 7
